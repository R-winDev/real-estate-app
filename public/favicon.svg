<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a4d8f"/>
      <stop offset="100%" style="stop-color:#1f3d73"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)"/>
  <!-- House body -->
  <rect x="18" y="28" width="28" height="20" fill="white"/>
  <!-- Roof -->
  <polygon points="32,12 12,30 52,30" fill="white"/>
  <!-- Door -->
  <rect x="27" y="38" width="10" height="10" fill="#2a4d8f"/>
  <!-- Windows -->
  <rect x="21" y="32" width="6" height="6" fill="#2a4d8f"/>
  <rect x="37" y="32" width="6" height="6" fill="#2a4d8f"/>
</svg>
